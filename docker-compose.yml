
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  image: air-quality-airflow:latest

  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DEFAULT_TIMEZONE: 'UTC'
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: 30
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    GCP_PROJECT_ID: ${GCP_PROJECT_ID}
    GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/keys/gcp-service-account.json
    AIRFLOW_VAR_OPENAQ_API_KEY: ${OPENAQ_API_KEY}
    DBT_PROFILES_DIR: /opt/airflow/dbt

  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/utils:/opt/airflow/utils
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/logs:/opt/airflow/logs
    - ./dbt:/opt/airflow/dbt
    - ./keys:/opt/airflow/keys:ro

  user: "${AIRFLOW_UID:-50000}:0"

  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy


services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB:       airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test:         ["CMD", "pg_isready", "-U", "airflow"]
      interval:     10s
      retries:      5
      start_period: 5s
    restart: always

  redis:
    image: redis:7.2-bookworm
    expose:
      - 6379
    healthcheck:
      test:         ["CMD", "redis-cli", "ping"]
      interval:     10s
      retries:      5
      start_period: 30s
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8090:8080"
    healthcheck:
      test:         ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval:     30s
      timeout:      10s
      retries:      5
      start_period: 30s
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"'
      interval:     30s
      timeout:      10s
      retries:      5
      start_period: 30s
    restart: always

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval:     30s
      timeout:      10s
      retries:      5
      start_period: 30s
    restart: always

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"'
      interval:     30s
      timeout:      10s
      retries:      5
      start_period: 30s
    restart: always

  # ── One-time initialisation ──────────────────────────────────
  # Note: environment uses *airflow-common-env (the env anchor)
  # NOT <<: *airflow-common (the full service anchor)
  # This avoids the circular reference that caused your error
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    image: air-quality-airflow:latest
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Running database migrations..."
        airflow db migrate

        echo "Creating admin user..."
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin || true

        echo "Installing dbt packages..."
        cd /opt/airflow/dbt && dbt deps --profiles-dir /opt/airflow/dbt

        echo "Airflow initialised successfully ✅"
    environment:
      <<: *airflow-common-env
      DBT_LOG_PATH: /tmp/dbt.log
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/utils:/opt/airflow/utils
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
      - ./dbt:/opt/airflow/dbt
      - ./keys:/opt/airflow/keys:ro
    user: "${AIRFLOW_UID:-50000}:0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure


volumes:
  postgres-db-volume:
